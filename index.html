<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wohnungs-Detektiv: Martel Edition (Ultra Hard Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Martel+Sans:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #DAF7F0; 
            --header-color: #D2B7D8;
            --accent-sage: #7BB39E;
            --btn-next: #75E192;
        }

        body { 
            font-family: 'Martel Sans', sans-serif; 
            background: var(--bg-color); 
            color: #333; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0; 
        }
        
        .container { width: 100%; max-width: 750px; }
        
        .ad-card { 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            overflow: hidden; 
            border: 2px solid var(--header-color); 
        }
        
        .ad-image-viewport { 
            width: 100%; 
            height: 350px; 
            overflow: hidden; 
            position: relative; 
            background-color: var(--accent-sage); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .ad-image-viewport img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .ad-content { padding: 40px; }
        
        .ad-title { 
            font-size: 1.8em; 
            font-weight: 900; 
            margin: 0 0 8px 0; 
            color: #2D3436; 
            line-height: 1.2;
        }
        
        .ad-location-header { 
            color: var(--accent-sage); 
            font-weight: 700; 
            margin-bottom: 25px; 
            font-size: 1em; 
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .price-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        
        .price-box { 
            background: #ffffff; 
            padding: 15px; 
            text-align: center; 
            border-radius: 10px;
            border: 2px solid var(--bg-color);
        }
        
        .label { font-size: 0.75em; font-weight: 700; color: #7F8C8D; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .value { font-size: 1.3em; font-weight: 900; color: #2D5A4A; }

        .info-section { margin-top: 25px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
        .section-h { font-size: 1.1em; font-weight: 800; color: #2D3436; margin-bottom: 10px; display: block; }
        .description-text { font-size: 1em; line-height: 1.7; color: #444; font-weight: 400; }

        .btn-group { display: flex; gap: 20px; margin-top: 35px; }
        
        button { 
            flex: 1; 
            padding: 20px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.1em; 
            transition: all 0.3s ease;
            font-family: 'Martel Sans', sans-serif;
            background: var(--btn-next); 
            color: white; 
            box-shadow: 0 4px 0 #5ec47b;
        }
        
        button:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="ad-card">
        <div class="ad-image-viewport">
            <img id="ad-image" src="" alt="Wohnung">
            <span id="img-fallback" style="position: absolute; color: white; font-weight: 800; text-align: center; padding: 0 20px;">Lade Vorschaubild...</span>
        </div>
        <div class="ad-content">
            <h1 id="ad-title" class="ad-title">-</h1>
            <div id="ad-loc-header" class="ad-location-header">📍 -</div>

            <div class="price-grid">
                <div class="price-box"><span class="label">Kaltmiete</span><span id="ad-kalt" class="value">-</span></div>
                <div class="price-box"><span class="label">Nebenkosten</span><span id="ad-neben" class="value">-</span></div>
                <div class="price-box"><span class="label">Wohnfläche</span><span id="ad-sqm" class="value">-</span></div>
            </div>

            <div class="info-section">
                <span class="section-h">Objektbeschreibung</span>
                <p id="ad-objekt" class="description-text">-</p>
            </div>

            <div class="info-section">
                <span class="section-h">Ausstattung</span>
                <p id="ad-ausstattung" class="description-text">-</p>
            </div>

            <div class="info-section">
                <span class="section-h">Lage</span>
                <p id="ad-lage" class="description-text">-</p>
            </div>

            <div class="btn-group">
                <button onclick="nextAd()">Nächste Anzeige prüfen</button>
            </div>
        </div>
    </div>
</div>

<script>
    const ads = [
        {
            imageUrl: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800",
            title: "Urbanes Business-Studio im Medienhafen",
            locHeader: "Hafenstraße, 40219 Düsseldorf",
            kalt: "485,00 €",
            neben: "140,00 €",
            sqm: "22,5 m²",
            objekt: "Dieses exklusive Einzimmer-Apartment wurde speziell für Menschen konzipiert, die keine Zeit für Möbelhäuser haben. Es befindet sich in einem energetisch sanierten Gebäude (Baujahr 2022) mit Aufzug und Concierge-Service.",
            ausstattung: "Löffelfertige Übergabe! Enthalten sind ein Boxspringbett, Flat-TV und eine Designer-Kitchenette. Bitte beachten Sie: Zusätzlich zur Miete wird ein monatlicher Möblierungszuschlag von 160,00 € fällig. Ein Tiefgaragenplatz kann optional für 90 € gemietet werden.",
            lage: "Absolute Top-Lage im Düsseldorfer Medienhafen. In direkter Nachbarschaft finden Sie preisgekrönte Architektur, Cafés und den Rheinpark."
        },
        {
            imageUrl: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=800",
            title: "Dachgeschoss-Studio mit Frankfurt-Skyline",
            locHeader: "Nordend-West, 60318 Frankfurt",
            kalt: "360,00 €",
            neben: "95,00 €",
            sqm: "26,0 m²",
            objekt: "Individuelles Wohnen unter dem Dach. Diese Wohnung bietet einen unvergleichlichen Blick und viel Tageslicht. Perfekt für Studenten oder Minimalisten, die den Charme von Schrägen lieben.",
            ausstattung: "Frisch versiegeltes Stäbchenparkett. Die Wärmeversorgung erfolgt modern und individuell über elektrische Nachtspeicheröfen. Die Warmwasserbereitung in Küche und Bad wird über Durchlauferhitzer sichergestellt.",
            lage: "Mitten im beliebten Nordend. Hier leben Sie zentral, aber ruhig. Supermärkte, Bio-Läden und kleine Bars sind in weniger als 5 Minuten zu Fuß erreichbar."
        },
        {
            imageUrl: "https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=800",
            title: "Großzügiger Altbau nähe Uni-Campus",
            locHeader: "Südstadt, 50677 Köln",
            kalt: "435,00 €",
            neben: "115,00 €",
            sqm: "32,0 m²",
            objekt: "Willkommen im klassischen Kölner Altbau. Hohe Decken und große Fenster sorgen für ein loftartiges Wohngefühl im ruhigen Hinterhaus. Fahrradabstellplätze im Hof sind vorhanden.",
            ausstattung: "Original Dielenboden. Die hochwertige Einbauküche mit Markengeräten muss vom Vormieter gegen einen Abschlag von 1.750,00 € übernommen werden. Geheizt wird über eine eigene Gas-Etagenheizung.",
            lage: "Zentraler geht es kaum. Der Uni-Campus ist nur 800 Meter entfernt."
        }
    ];

    let currentIdx = 0;

    function renderAd() {
        const ad = ads[currentIdx];
        const img = document.getElementById('ad-image');
        const fallback = document.getElementById('img-fallback');

        img.style.display = 'none';
        fallback.style.display = 'block';

        img.onload = function() {
            img.style.display = 'block';
            fallback.style.display = 'none';
        };

        img.src = ad.imageUrl;
        document.getElementById('ad-title').innerText = ad.title;
        document.getElementById('ad-loc-header').innerText = "📍 " + ad.locHeader;
        document.getElementById('ad-kalt').innerText = ad.kalt;
        document.getElementById('ad-neben').innerText = ad.neben;
        document.getElementById('ad-sqm').innerText = ad.sqm;
        document.getElementById('ad-objekt').innerHTML = ad.objekt;
        document.getElementById('ad-ausstattung').innerHTML = ad.ausstattung;
        document.getElementById('ad-lage').innerHTML = ad.lage;
    }

    function nextAd() {
        currentIdx = (currentIdx + 1) % ads.length;
        renderAd();
    }

    renderAd();
</script>

</body>
</html>
