<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wohnungsanzeigen</title>
    <link href="https://fonts.googleapis.com/css2?family=Martel+Sans:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #DAF7F0; 
            --header-color: #D2B7D8;
            --accent-sage: #7BB39E;
            --btn-next: #75E192;
        }

        body { 
            font-family: 'Martel Sans', sans-serif; 
            background: var(--bg-color); 
            color: #333; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            padding: 20px; 
            margin: 0; 
        }
        
        .container { width: 100%; max-width: 750px; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            width: 100%;
        }

        .counter-text { font-weight: 800; color: var(--accent-sage); font-size: 0.9em; }

        .dots-container { display: flex; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #eee; transition: all 0.3s; }
        .dot.active { background: var(--header-color); transform: scale(1.2); }

        .ad-card { 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            overflow: hidden; 
            border: 2px solid var(--header-color); 
        }
        
        .ad-image-viewport { 
            width: 100%; 
            height: 350px; 
            overflow: hidden; 
            position: relative; 
            background-color: var(--accent-sage); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .ad-image-viewport img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .ad-content { padding: 40px; }
        
        .ad-title { 
            font-size: 1.8em; 
            font-weight: 900; 
            margin: 0 0 8px 0; 
            color: #2D3436; 
            line-height: 1.2;
        }
        
        .ad-location-header { 
            color: var(--accent-sage); 
            font-weight: 700; 
            margin-bottom: 25px; 
            font-size: 1em; 
        }
        
        .price-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        
        .price-box { 
            background: #ffffff; 
            padding: 15px; 
            text-align: center; 
            border-radius: 10px;
            border: 2px solid var(--bg-color);
        }
        
        .label { font-size: 0.75em; font-weight: 700; color: #7F8C8D; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .value { font-size: 1.3em; font-weight: 900; color: #2D5A4A; }

        .info-section { margin-top: 25px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
        .section-h { font-size: 1.1em; font-weight: 800; color: #2D3436; margin-bottom: 10px; display: block; }
        .description-text { font-size: 1em; line-height: 1.7; color: #444; font-weight: 400; }

        .nav-group { display: flex; gap: 15px; margin-top: 35px; }
        
        button { 
            flex: 1; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1em; 
            transition: all 0.3s ease;
            font-family: 'Martel Sans', sans-serif;
            color: white; 
        }

        .btn-prev { background: #B2BEC3; box-shadow: 0 4px 0 #636E72; }
        .btn-next { background: var(--btn-next); box-shadow: 0 4px 0 #5ec47b; }
        
        button:active { transform: translateY(4px); box-shadow: none; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <span class="counter-text" id="ad-counter">Anzeige 1 von 5</span>
        <div class="dots-container" id="dots-container"></div>
    </div>

    <div class="ad-card">
        <div class="ad-image-viewport">
            <img id="ad-image" src="" alt="Wohnung">
            <span id="img-fallback" style="position: absolute; color: white; font-weight: 800; text-align: center; padding: 0 20px;">Lade Bild...</span>
        </div>
        <div class="ad-content">
            <h1 id="ad-title" class="ad-title">-</h1>
            <div id="ad-loc-header" class="ad-location-header">📍 -</div>

            <div class="price-grid">
                <div class="price-box"><span class="label">Kaltmiete</span><span id="ad-kalt" class="value">-</span></div>
                <div class="price-box"><span class="label">Nebenkosten</span><span id="ad-neben" class="value">-</span></div>
                <div class="price-box"><span class="label">Größe</span><span id="ad-sqm" class="value">-</span></div>
            </div>

            <div class="info-section">
                <span class="section-h">Beschreibung</span>
                <p id="ad-objekt" class="description-text">-</p>
            </div>

            <div class="info-section">
                <span class="section-h">Ausstattung & Kosten</span>
                <p id="ad-ausstattung" class="description-text">-</p>
            </div>

            <div class="info-section">
                <span class="section-h">Lage</span>
                <p id="ad-lage" class="description-text">-</p>
            </div>

            <div class="nav-group">
                <button id="prevBtn" class="btn-prev" onclick="changeAd(-1)">← Zurück</button>
                <button id="nextBtn" class="btn-next" onclick="changeAd(1)">Nächste Anzeige →</button>
            </div>
        </div>
    </div>
</div>

<script>
    const ads = [
        {
            imageUrl: "https://images.unsplash.com/photo-1598928506311-c55ded91a20c?auto=format&fit=crop&w=800",
            title: "WG-Zimmer in der Südstadt – Ideal für Azubis",
            locHeader: "Gibitzenhof, Nürnberg",
            kalt: "310,00 €",
            neben: "75,00 €",
            sqm: "15,5 m²",
            objekt: "Suche Mitbewohner/in für unsere entspannte 2er-WG. Die Wohnung ist zweckmäßig eingerichtet, wir haben eine funktionierende Küche und ein Bad mit Fenster.",
            ausstattung: "Zimmer ist unmöbliert. Wichtig: Die Einbauküche muss vom Vormieter übernommen werden (einmaliger Abschlag: 400 €). Strom und Gas müssen wir selbst beim Versorger anmelden.",
            lage: "Perfekt gelegen für alle, die bei MAN oder Siemens arbeiten. Die Tram 4 hält fast vor der Tür. In 10 Minuten bist du am Hauptbahnhof."
        },
        {
            imageUrl: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=800",
            title: "Kreatives Dachstudio in 'GoHo'",
            locHeader: "Gostenhof, Nürnberg",
            kalt: "375,00 €",
            neben: "85,00 €",
            sqm: "24,0 m²",
            objekt: "Individuelle 1-Zimmer-Wohnung im Szeneviertel Gostenhof. Viel Licht durch große Dachfenster. Perfekt für Leute, die das urbane Leben lieben.",
            ausstattung: "Dielenboden. Geheizt wird über moderne Infrarot-Elektropaneele. Warmwasserbereitung erfolgt über einen Boiler im Bad. Internet-Flatrate kann für 25 € übernommen werden.",
            lage: "Mitten im Herzen von GoHo. Cafés, Bars und Ateliers sind deine Nachbarn. Die U1 ist nur 3 Gehminuten entfernt."
        },
        {
            imageUrl: "https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&w=800",
            title: "Modernes Zimmer mit Balkon nähe Nordstadt",
            locHeader: "Maxfeld, Nürnberg",
            kalt: "420,00 €",
            neben: "110,00 €",
            sqm: "20,0 m²",
            objekt: "Helles WG-Zimmer in top-renovierter Wohnung. Wir haben eine neue Küche und ein stylisches Bad. Wir suchen jemanden, der Ordnung schätzt.",
            ausstattung: "Fußbodenheizung. Der Mietvertrag ist ein Untermietvertrag mit einer jährlichen Staffelmiete von 4 %. Mindestmietdauer beträgt 18 Monate.",
            lage: "Sehr beliebte Lage am Stadtpark. Hier ist es ruhig, aber du bist mit der U3 in wenigen Minuten in der City oder an der Wiso."
        },
        {
            imageUrl: "https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=800",
            title: "Altbau-Charme in St. Johannis",
            locHeader: "St. Johannis, Nürnberg",
            kalt: "445,00 €",
            neben: "120,00 €",
            sqm: "30,0 m²",
            objekt: "Hübsche 1-Zimmer-Wohnung im Hinterhaus. Hohe Decken und Blick in den grünen Innenhof. Sehr ruhiges Wohnen in bester Nachbarschaft.",
            ausstattung: "Parkettboden. Die schicke Küchenzeile muss gegen einen Abschlag von 1.500 € abgelöst werden. Die Heizung läuft über eine Gas-Etagentherme (Kosten nicht in NK enthalten).",
            lage: "St. Johannis gehört zu den begehrtesten Vierteln. Die Pegnitzwiesen zum Joggen sind direkt um die Ecke, ebenso wie gute Restaurants."
        },
        {
            imageUrl: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800",
            title: "Smart-Living am Wöhrder See",
            locHeader: "Tullnau, Nürnberg",
            kalt: "495,00 €",
            neben: "135,00 €",
            sqm: "21,0 m²",
            objekt: "Kompaktes Apartment in Neubau-Anlage (2023). Ideal für alle, die direkt einziehen wollen, ohne Möbel zu schleppen.",
            ausstattung: "Voll möbliert mit Bett, Schreibtisch und Kitchenette. Wichtig: Es wird ein monatlicher Möblierungszuschlag von 145 € erhoben. Community-Lounge im Haus vorhanden.",
            lage: "Top-Lage für Sportler direkt am Wöhrder See. Die TH Nürnberg ist mit dem Fahrrad in 5 Minuten erreicht. S-Bahn Station Tullnaupark direkt vor der Tür."
        }
    ];

    let currentIdx = 0;

    function initStatus() {
        const dotsContainer = document.getElementById('dots-container');
        dotsContainer.innerHTML = '';
        ads.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.id = `dot-${i}`;
            dotsContainer.appendChild(dot);
        });
        renderAd();
    }

    function renderAd() {
        const ad = ads[currentIdx];
        const img = document.getElementById('ad-image');
        const fallback = document.getElementById('img-fallback');

        img.style.display = 'none';
        fallback.style.display = 'block';
        img.onload = () => { img.style.display = 'block'; fallback.style.display = 'none'; };
        img.src = ad.imageUrl;

        document.getElementById('ad-title').innerText = ad.title;
        document.getElementById('ad-loc-header').innerText = "📍 " + ad.locHeader;
        document.getElementById('ad-kalt').innerText = ad.kalt;
        document.getElementById('ad-neben').innerText = ad.neben;
        document.getElementById('ad-sqm').innerText = ad.sqm;
        document.getElementById('ad-objekt').innerHTML = ad.objekt;
        document.getElementById('ad-ausstattung').innerHTML = ad.ausstattung;
        document.getElementById('ad-lage').innerHTML = ad.lage;

        document.getElementById('ad-counter').innerText = `Anzeige ${currentIdx + 1} von ${ads.length}`;
        ads.forEach((_, i) => {
            document.getElementById(`dot-${i}`).className = (i === currentIdx) ? 'dot active' : 'dot';
        });

        document.getElementById('prevBtn').disabled = (currentIdx === 0);
        document.getElementById('nextBtn').disabled = (currentIdx === ads.length - 1);
    }

    function changeAd(step) {
        currentIdx += step;
        renderAd();
    }

    initStatus();
</script>

</body>
</html>
