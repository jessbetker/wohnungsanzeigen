<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Budget-Ninja 2.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 20px; font-size: 1.8em; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #34495e; font-size: 0.9em; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        input:focus { border-color: #3498db; outline: none; background: #f9fbff; }
        
        .tacho-container { background: #ecf0f1; height: 20px; border-radius: 10px; margin: 20px 0 10px 0; overflow: hidden; }
        #tacho-bar { height: 100%; width: 0%; background: #27ae60; transition: width 0.4s ease; }
        
        .results { background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 5px solid #2c3e50; margin-top: 20px; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1.1em; }
        .total-left { font-weight: bold; color: #2ecc71; border-top: 1px solid #ddd; pt: 5px; margin-top: 5px; }
        .total-left.danger { color: #e74c3c; }

        .hint { font-size: 0.75em; color: #7f8c8d; text-align: center; margin-top: 15px; font-style: italic; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Budget Rechner</h1>
        
        <div class="input-group">
            <label>Monatliches Budget (€) (Einkommen/Eltern/BAföG)</label>
            <input type="number" id="income" placeholder="z.B. 850" oninput="calculate()">
        </div>
        
        <hr>
        <p style="font-size: 0.85em; color: #95a5a6; margin-bottom: 10px;">Fixkosten eingeben:</p>
        <div class="input-group"><label>🏠 Miete & Nebenkosten (€)</label><input type="number" class="cost" placeholder="0" oninput="calculate()"></div>
        <div class="input-group"><label>⚡ Strom & Wärme (€)</label><input type="number" class="cost" placeholder="0" oninput="calculate()"></div>
        <div class="input-group"><label>🌐 Internet & Handy (€)</label><input type="number" class="cost" placeholder="0" oninput="calculate()"></div>
        <div class="input-group"><label>📺 GEZ & Abos (Netflix etc.) (€)</label><input type="number" class="cost" placeholder="0" oninput="calculate()"></div>
        <div class="input-group"><label>🛡️ Versicherungen & Bank (€)</label><input type="number" class="cost" placeholder="0" oninput="calculate()"></div>

        <div class="tacho-container"><div id="tacho-bar"></div></div>

        <div class="results">
            <div class="result-line">
                <span>Fixkosten-Anteil:</span>
                <span id="percent">0%</span>
            </div>
            <div class="result-line total-left" id="balance-line">
                <span>Freies Budget:</span>
                <span id="remaining">0,00 €</span>
            </div>
        </div>
        
        <p class="hint">Variable Kosten (Essen, Party, Kleidung) müssen vom "freien Budget" bezahlt werden!</p>
    </div>

    <script>
        function calculate() {
            const income = parseFloat(document.getElementById('income').value) || 0;
            const costs = document.querySelectorAll('.cost');
            let totalCosts = 0;
            costs.forEach(input => totalCosts += parseFloat(input.value) || 0);

            const remaining = income - totalCosts;
            const percentage = income > 0 ? Math.min((totalCosts / income) * 100, 100) : 0;
            
            // Tacho Update
            const bar = document.getElementById('tacho-bar');
            bar.style.width = percentage + '%';
            
            // Farbe des Tachos & Textes
            const balanceElement = document.getElementById('remaining');
            if (percentage > 75 || remaining < 100) {
                bar.style.background = '#e74c3c'; // Alarm: Rot
                balanceElement.parentElement.classList.add('danger');
            } else if (percentage > 50) {
                bar.style.background = '#f1c40f'; // Achtung: Gelb
                balanceElement.parentElement.classList.remove('danger');
            } else {
                bar.style.background = '#27ae60'; // Okay: Grün
                balanceElement.parentElement.classList.remove('danger');
            }
            
            // Text Update
            document.getElementById('percent').innerText = percentage.toFixed(1) + '%';
            document.getElementById('remaining').innerText = remaining.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
        }
    </script>
</body>
</html>
